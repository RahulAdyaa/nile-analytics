services:
- type: web
name: nile-analytics-web
env: python
buildCommand: "./build_files.sh"
startCommand: "gunicorn core.wsgi:application"
envVars:
- key: DATABASE_URL
fromDatabase:
name: nile-db
property: connectionString
- key: REDIS_URL
fromService:
type: redis
name: nile-redis
property: connectionString
- fromGroup: nile-shared-vars
- key: DEBUG
value: "False"
- key: PYTHON_VERSION
value: "3.9.13"

- type: redis
name: nile-redis
ipAllowList: []

databases:
- name: nile-db
plan: free

envVarGroups:
- name: nile-shared-vars
envVars:
- key: SECRET_KEY
generateValue: true
