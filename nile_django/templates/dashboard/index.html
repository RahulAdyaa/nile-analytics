{% extends 'base.html' %}

{% block content %}
<div class="space-y-16 animate-in fade-in slide-in-from-bottom-4 duration-1000">
    <!-- Header with Dynamic Filters -->
    <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-8 pb-8 border-b border-brand-border">
        <div>
            <div class="flex items-center space-x-2 text-[10px] font-mono text-brand-red uppercase tracking-widest mb-4">
                <span class="w-2 h-2 bg-brand-red rounded-full"></span>
                <span>Operational_Overview // 01</span>
            </div>
            <h2 class="text-6xl font-heading font-bold text-brand-text tracking-tight">Intelligence Dashboard</h2>
            <p class="text-brand-muted mt-4 max-w-xl font-medium">Real-time telemetry and advanced analytics for the global retail network.</p>
        </div>
        <form id="filters-form" 
              hx-get="{% url 'dashboard_home' %}" 
              hx-target="#dashboard-dynamic-content" 
              hx-indicator="#loading-spinner"
              hx-trigger="change"
              hx-push-url="true"
              class="flex flex-wrap items-center gap-4">
            
            <div class="flex items-center space-x-3 bg-brand-bg tactical-border rounded-full px-5 py-2">
                <label class="text-[10px] font-mono font-bold uppercase tracking-widest text-brand-muted">Date:</label>
                <input type="date" name="start_date" value="{{ start_date }}" class="bg-transparent border-none text-brand-text text-xs font-bold font-mono focus:ring-0 cursor-pointer p-0">
                <span class="text-brand-muted text-xs font-mono">-</span>
                <input type="date" name="end_date" value="{{ end_date }}" class="bg-transparent border-none text-brand-text text-xs font-bold font-mono focus:ring-0 cursor-pointer p-0">
            </div>

            <div class="flex items-center space-x-3 bg-brand-bg tactical-border rounded-full px-5 py-2">
                <label class="text-[10px] font-mono font-bold uppercase tracking-widest text-brand-muted">Category:</label>
                <select name="category" class="bg-transparent border-none text-brand-text text-xs font-bold font-mono focus:ring-0 cursor-pointer uppercase tracking-wider p-0 pr-6">
                    <option value="All">ALL_CATEGORIES</option>
                    {% for cat in categories %}
                        <option value="{{ cat }}" {% if cat == selected_category %}selected{% endif %}>{{ cat|upper }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex items-center space-x-3 bg-brand-bg tactical-border rounded-full px-5 py-2">
                <label class="text-[10px] font-mono font-bold uppercase tracking-widest text-brand-muted">Region:</label>
                <select name="country" class="bg-transparent border-none text-brand-text text-xs font-bold font-mono focus:ring-0 cursor-pointer uppercase tracking-wider p-0 pr-6">
                    <option value="All">GLOBAL_VIEW</option>
                    {% for country in countries %}
                        <option value="{{ country }}" {% if country == selected_country %}selected{% endif %}>{{ country|upper }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </div>

    <!-- Dynamic Content Container -->
    <div id="dashboard-dynamic-content" class="relative">
        <div id="loading-spinner" class="htmx-indicator absolute inset-0 z-[100] rounded-3xl bg-white/40 backdrop-blur-sm overflow-hidden">
            <!-- Skeleton Layout -->
            <div class="space-y-16 animate-pulse opacity-60 pointer-events-none p-2">
                <!-- Row 01 Skeleton -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="h-32 bg-gray-200 rounded-[2rem]"></div>
                    <div class="h-32 bg-gray-200 rounded-[2rem]"></div>
                    <div class="h-32 bg-gray-200 rounded-[2rem]"></div>
                </div>
                <!-- Row 02 Skeleton -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div class="h-[400px] bg-gray-200 rounded-[2.5rem]"></div>
                    <div class="h-[400px] bg-gray-200 rounded-[2.5rem]"></div>
                </div>
            </div>
            
            <!-- Spinner Overlay -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="flex flex-col items-center space-y-4 bg-white/90 p-8 rounded-3xl backdrop-blur-md tactical-border shadow-2xl">
                    <div class="animate-spin h-10 w-10 border-2 border-brand-red border-t-transparent rounded-full"></div>
                    <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-brand-red font-bold">Computing_Vectors...</span>
                </div>
            </div>
        </div>
        {% include 'dashboard/partials/charts_content.html' %}
    </div>
</div>
{% endblock %}
